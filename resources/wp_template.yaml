id: "{{WP_ID}}"
status: in_progress             # Default start state
current_stage: detection        # Default start stage
current_owner: expeditor

target:
  upstream_project: "{{PROJECT}}"
  upstream_version: ""                # Empty at creation; detector fills this in
  # Cycle scope is hardcoded — Hibiscus dev cycle only. Stable releases out of
  # scope. Bump these three together when promoting to the next cycle.
  openstack_series: hibiscus
  ubuntu_release: noble
  uca_pocket: hibiscus
  trigger:
    type: upstream_release
    detected: "{{TIMESTAMP}}"
    source: "{{SOURCE_URL}}"

# Audit trail
stamps: []    # Agents will append objects here
history: []   # Agents will append event logs here

open_issues: []
intervention: null
